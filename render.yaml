services:
  - type: web
    name: smart1boat
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 300
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SMART1_WEBHOOK_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ENABLE_PDF
        value: "1"
      - key: ALLOWED_ORIGINS
        value: "*"
